name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

# Cancel in-progress runs when a new commit lands on the same ref —
# avoids 3 OS × 2 Python = 6 stale jobs piling up behind every push.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------
  # Full suite with enterprise extras across the support matrix.
  # ---------------------------------------------------------------
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    name: test (${{ matrix.os }} / py${{ matrix.python-version }})

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + test tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[enterprise,dev]" pytest-timeout

      # Skip the subprocess-heavy pytest-wrapper tests (~3 min each) on
      # matrix jobs; they run once in the dedicated `slow-tests` job.
      # The acceptance_tests suite is tested functionally by its unit
      # tests; skipping here keeps the matrix under 5 min per cell.
      - name: Run fast suite (enterprise)
        run: |
          python -m pytest -q --timeout=60 \
            --ignore=tests/test_acceptance_tests.py \
            --ignore=tests/test_acceptance_sandbox.py \
            --durations=10

      - name: Verify CLI entry point installed
        run: aios --version

      - name: Smoke-test init -> append -> replay -> check-profile
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _ci_home
          aios init _ci_home --profile P-Local
          aios append --home _ci_home --kind ci.smoke --actor A1 --payload '{"build":"ci"}'
          aios replay --home _ci_home | tail -5
          aios check-profile --home _ci_home
          rm -rf _ci_home

  # ---------------------------------------------------------------
  # Minimal-install job — proves the P-Local path works stdlib-only.
  # Cryptography-dependent tests skip cleanly via their pytestmark.
  # ---------------------------------------------------------------
  test-minimal:
    name: test (minimal install, no enterprise extra)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package (no enterprise extra)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]" pytest-timeout

      # Every cryptography-dependent test file carries
      # `pytestmark = pytest.mark.skipif(not cryptography_available())`
      # so they skip cleanly here. Also skip the subprocess-heavy
      # pytest-wrapper tests (covered in slow-tests).
      - name: Run core suite (stdlib core + jsonschema)
        run: |
          python -m pytest -q --timeout=60 \
            --ignore=tests/test_acceptance_tests.py \
            --ignore=tests/test_acceptance_sandbox.py \
            --durations=10

      - name: Verify CLI entry point installed
        run: aios --version

  # ---------------------------------------------------------------
  # Subprocess-pytest tests — slow but correct. Run once on Linux
  # with extended timeout. Not gating merges; provides a clean signal
  # on the acceptance-test wrapper behavior.
  # ---------------------------------------------------------------
  slow-tests:
    name: slow tests (subprocess pytest wrappers)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install with enterprise extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[enterprise,dev]" pytest-timeout

      - name: Run subprocess-heavy acceptance test suites
        run: |
          python -m pytest -q --timeout=300 \
            tests/test_acceptance_tests.py \
            tests/test_acceptance_sandbox.py \
            --durations=10
